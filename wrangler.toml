name = "youhit"
main = "server/src/worker.ts"
compatibility_date = "2026-01-01"

[assets]
directory = "./client/dist"
binding = "ASSETS"

[vars]
CLIENT_URL = "https://youhit.lnex.dev"
API_REDIRECT_URI = "https://youhit.lnex.dev/auth/callback"

# KV namespace bound via CF dashboard:
# Variable name: SESSION_KV
#
# Secrets set via CF dashboard (Workers → Settings → Variables):
# - API_CLIENT_ID
# - API_CLIENT_SECRET
# - SESSION_SECRET